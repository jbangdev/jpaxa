name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  variants-smoke:
    name: Build stubs + build all variants (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Sanity check
        run: | 
          # Check that build folder does not exist. Fail if it does.
          if [ -d build ]; then
            echo "::error::build/ directory already exists. Please remove it (or run CI with a clean workspace)."
            exit 1
          fi
      - name: Assemble jpaxa
        run: |
         jreleaser assemble
         jbang build/jpaxa/jpaxa.jar --version

      - name: Tar build (preserve permissions)
        shell: bash
        run: |
          set -euo pipefail
          tar -czf build.tgz build

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-tgz
          path: build.tgz
          if-no-files-found: error
      
      - name: verify jar
        run: |
          jbang build/jpaxa/jpaxa.jar verify
      - name: verify binary
        run: |
          build/jpaxa-output/jpaxa-linux-x86_64 verify

  platform-matrix:
    name: Package + run on ${{ matrix.name }}
    needs: [variants-smoke]
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runs_on: ubuntu-latest
            variant: linux-x86_64
            output: hello
            run_cmd: ./build/jpaxa-output/jpaxa-linux-x86_64 verify

          # Hosted arm64 runners are not available in all orgs. If this fails to schedule,
          # remove this entry.
          #- name: linux-arm64
          #  runs_on: ubuntu-24.04-arm64
          #  variant: linux-aarch_64
          #  output: hello
          #  run_cmd: ./dist/hello-linux-aarch_64 CI

          - name: macos-x64
            runs_on: macos-15-intel
            variant: osx-x86_64
            output: hello
            run_cmd: ./build/jpaxa-output/jpaxa-osx-x86_64 verify

          - name: macos-arm64
            runs_on: macos-latest
            variant: osx-aarch_64
            output: hello
            run_cmd: ./build/jpaxa-output/jpaxa-osx-aarch_64 verify

          - name: windows-x64
            runs_on: windows-latest
            variant: windows-x86_64
            output: ./build/jpaxa-output/jpaxa-windows-x86_64.exe verify

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-tgz
          path: .

      - name: Run packaged app (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf build.tgz
          out="$(${{ matrix.run_cmd }})"
          echo "$out"
          echo "$out" | grep -F "Verifying stubs for 6 platform(s)"

      - name: Run packaged app (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          tar -xzf stubs.tgz
          tar -xzf build.tgz
          $exe = "build\jpaxa-output\jpaxa-windows-x86_64.exe"
          if (!(Test-Path $exe)) { throw "Expected output not found: $exe" }
          $outLines = & $exe verify 2>&1
          $outText = ($outLines -join "`n")
          Write-Host $outText
          if ($outText -notlike "*Verifying stubs for 6 platform(s)*") { throw "Missing expected greeting" }

  earlyaccess:
    name: Early-access release
    needs: [variants-smoke, platform-matrix]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Download build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-tgz
          path: .

      - name: Extract build
        run: tar -xzf build.tgz

      - name: Release
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: jbang org.jreleaser:jreleaser-tool-provider:1.24.0 release --git-root-search
